acts:
    - id: act_1
      title: 第一幕
      summary: 故事开端
      scenes:
        - id: scene_1
          type: scene
          title: 深夜的农舍
          sequence: 1
          setting:
            location: 韩立家茅屋卧室
            location_type: 农舍
            time_of_day: 夜晚
            atmosphere: 昏暗、寂静、带有霉味和轻微的争吵声
          summary: 韩立躺在床上，听父母在隔壁说话，回忆自己名字的由来和对外面世界的向往，在二哥韩铸的鼾声中渐渐入睡。
          chapter_source: 1
          mood: 宁静中带着一丝压抑和期待
          characters_present:
            - id: char_hanli
              state: 半睡半醒，内心充满对外界的向往
            - id: char_hanzhu
              state: 酣睡打呼
            - id: char_hanfu
              state: 在隔壁抽旱烟，与妻子交谈
            - id: char_hanmu
              state: 在隔壁唠唠叨叨埋怨
          elements:
            - type: action
              id: elem_1
              content: 夜色深沉，破旧的茅屋内，韩立和二哥韩铸挤在一张木床上。韩铸早已熟睡，打着响亮的鼾声。韩立睁着眼睛，望着黑暗中的房梁，隔壁传来父母压低声音的交谈。
              visual_cue: 摇镜头从窗外月色缓缓推进到床上两个孩子，聚焦韩立睁着的眼睛
            - type: internal_monologue
              id: elem_2
              content: 爹娘还在说我的事……这名字是老张叔起的，他说‘韩立’二字寓意‘立足大地’，可我总觉着，外面的世界才值得立足。
              speaker_id: char_hanli
              speaker_name: 韩立
            - type: action
              id: elem_3
              content: 韩铸翻了个身，鼾声渐弱。韩立侧耳听着隔壁父母低声的叹息和絮语，脑海中浮现出三叔描述的山外景象——城镇、高楼、车马。
            - type: action
              id: elem_4
              content: 虫鸣声从窗外传来，韩立的眼皮渐渐沉重。在一片鼾声和夜色中，他慢慢闭上眼睛，呼吸变得均匀。
        - id: scene_2
          type: scene
          title: 午后的家
          sequence: 2
          setting:
            location: 韩立家堂屋
            location_type: 农舍
            time_of_day: 中午
            atmosphere: 炎热、忙碌，突然到来的访客带来新希望
          summary: 韩立从山里拾柴回来，发现三叔来访。三叔说明来意，推荐韩立参加七玄门内门弟子测试，韩父经犹豫后同意。
          chapter_source: 1
          mood: 期盼与不安交织
          characters_present:
            - id: char_hanli
              state: 兴奋、好奇
            - id: char_sanshu
              state: 精明、和蔼、有说服力
            - id: char_hanfu
              state: 犹豫、最终下决心
            - id: char_hanmu
              state: 在一旁倾听，偶尔插话
          elements:
            - type: action
              id: elem_1
              content: 午后，韩立背着一捆干柴，推开自家院门。院子里停着一辆青布驴车，他愣了一下，放下柴火，快步走向堂屋。
              visual_cue: 镜头跟随韩立从院门到堂屋门口
            - type: internal_monologue
              id: elem_2
              content: 三叔的驴车？难道家里出了什么事？
              speaker_id: char_hanli
              speaker_name: 韩立
            - type: action
              id: elem_3
              content: 堂屋内，韩父、韩母正陪着一位穿绸缎的中年男子说话，正是三叔。桌上放着几包点心。
              visual_cue: 推进镜头，展现三人表情：三叔热切，韩父愁眉，韩母低头擦泪
            - type: dialogue
              id: elem_4
              content: 二哥，嫂子，你们听我说，这可是难得的好机会。七玄门招收内门弟子，只要通过测试，吃穿不愁，将来还有大出息！
              speaker_id: char_sanshu
              speaker_name: 三叔
              tone: 热切
              delivery: 双手比划，语气激昂
            - type: action
              id: elem_5
              content: 韩父搓着粗糙的双手，脸上写满犹豫。韩母用袖子擦拭眼角。
              visual_cue: 特写韩父的双手，然后拉回面部
            - type: dialogue
              id: elem_6
              content: 他三叔，小立才十岁，这么小离家……再说了，测试要是有个闪失……
              speaker_id: char_hanfu
              speaker_name: 韩父
              tone: 迟疑
              delivery: 声音低沉，断断续续
            - type: dialogue
              id: elem_7
              content: 二哥你放心，我在七玄门多少有些关系，小立这孩子机灵，准能行！再说，测试有吃有住，又不花钱。要是选上了，每个月还能给家里捎些银子回来。
              speaker_id: char_sanshu
              speaker_name: 三叔
              tone: 信心十足
              delivery: 拍拍韩父肩膀
            - type: action
              id: elem_8
              content: 韩立在门外听到这里，心中一热。他紧紧握了握拳头，大步跨进门槛。
              visual_cue: 横移镜头跟拍韩立跨门动作
            - type: dialogue
              id: elem_9
              content: 爹，娘，我愿意去参加测试！
              speaker_id: char_hanli
              speaker_name: 韩立
              tone: 坚定
              delivery: 目光直视父母，毫不退缩
            - type: action
              id: elem_10
              content: 屋里三人齐齐看向韩立。韩父愣了一愣，韩母连忙擦干眼泪。三叔脸上露出赞许的笑容。
              visual_cue: 三人反应镜头的快速切换
            - type: dialogue
              id: elem_11
              content: 好小子，有志气！
              speaker_id: char_sanshu
              speaker_name: 三叔
              tone: 满意
              delivery: 对韩立竖起大拇指
            - type: action
              id: elem_12
              content: 韩父沉默良久，望着韩立坚毅的眼神，终于长叹一口气，缓缓点了点头。
              visual_cue: 特写韩父点头的慢动作
            - type: dialogue
              id: elem_13
              content: 罢了，既然老三你这么说了，那就让小立去试试吧。不过，一切要小心。
              speaker_id: char_hanfu
              speaker_name: 韩父
              tone: 无奈中带点期盼
              delivery: 声音沙哑，最后看向韩立
        - id: scene_3
          type: scene
          title: 离别之日
          sequence: 3
          setting:
            location: 村口路边
            location_type: 荒野
            time_of_day: 白天
            atmosphere: 伤感、不舍，有些许悲壮
          summary: 一个多月后，三叔准时来接韩立。韩立告别父母，登上马车，强忍泪水，暗下决心挣大钱后回来。
          chapter_source: 1
          mood: 离愁别绪，略带希望
          characters_present:
            - id: char_hanli
              state: 伤感、强忍泪水、暗下决心
            - id: char_sanshu
              state: 照顾、催促
            - id: char_hanfu
              state: 反复嘱咐、担忧
            - id: char_hanmu
              state: 落泪、叮嘱保重
          elements:
            - type: narration
              id: elem_1
              content: 一个多月后，三叔如约驾着马车停在村口路边，等韩立告别家人。
              visual_cue: 远景：村口土路旁，一辆旧马车，三叔端坐车辕，韩父韩母站在路旁，韩立背着包袱走来。
            - type: action
              id: elem_2
              content: 韩立向父亲深深鞠躬，又转身抱住母亲。韩母粗糙的手抚摸他的脸，眼眶泛红。韩父强作镇定，拍了拍儿子的肩膀，低语交代。
              delivery: 韩母动作轻柔，韩父拍肩时有伤感的停顿。
              visual_cue: 中景：三人互动，阳光斜照，尘土微扬。
            - type: action
              id: elem_3
              content: 韩立松开母亲，咬紧嘴唇，转身登上马车。他在车辕上坐定，迅速用袖子擦了擦眼角。
              delivery: 动作决绝，但背对父母时肩膀微颤。
              visual_cue: 特写：韩立低头拭泪的手，随后抬头望向家的方向。
            - type: internal_monologue
              id: elem_4
              content: 一定要挣大钱后回来！
              speaker_id: char_hanli
              speaker_name: 韩立
              delivery: 内心坚定，画外音略带沙哑
              visual_cue: 镜头拉远：马车缓缓驶离，父母的剪影越来越小。
        - id: scene_4
