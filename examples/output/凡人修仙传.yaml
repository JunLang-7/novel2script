            atmosphere: 拥挤、嘈杂、阶层分明
          summary: 韩立在拥挤的车厢内观察其他孩童，将大家分为三类：以舞岩为首的锦衣少年、城镇孩童、以及像自己一样的乡下穷孩子，内心明白阶层差距。
          chapter_source: 3
