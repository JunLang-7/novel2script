            - type: action
              id: elem_4
              content: 王护法不动声色地收下钱袋，然后朝韩立招了招手。
              visual_cue: 王护法面色如常，眼神示意韩立
            - type: action
              id: elem_5
              content: 韩立跟着王护法上了马车。
              visual_cue: 韩立回头看了一眼三叔，然后钻进车厢
            - type: action
              id: elem_6
              content: 马车缓缓启动，准备前往七玄门。
              visual_cue: 车轮滚动，尘土扬起，马车消失在道路尽头
        - id: scene_7
