            - type: action
              id: elem_2
              content: 韩立抬头望去，舞岩已经遥遥领先，几乎看不到他的背影。周围的其他测试者也都远远超过了他。
              visual_cue: 镜头从韩立视角仰视上方，舞岩的小身影已远去
            - type: internal_monologue
              id: elem_3
              content: （内心独白）我真的不行了……太疼了，差距这么大，我怎么可能追得上？放弃吧……
              speaker_id: char_hanli
              speaker_name: 韩立
              tone: 绝望
              delivery: 画外音，虚弱无力
            - type: action
              id: elem_4
              content: 韩立的手指一滑，身体失去平衡，向下方坠落。就在即将坠落的瞬间，一只有力的手臂从身侧伸出，稳稳地托住了他的腰。
              visual_cue: 慢动作：韩立滑落，师兄的手突然介入
            - type: action
              id: elem_5
              content: 那是负责护送的师兄（张均）。他面无表情地看了韩立一眼，手上用力一推，将韩立推回岩壁。韩立重新抓住岩石，仿佛被这一推激起了狠劲，他咬紧牙关，眼神变得坚定，继续向上攀爬。
              visual_cue: 韩立的眼神从绝望转为倔强，特写他紧握岩石的手指
