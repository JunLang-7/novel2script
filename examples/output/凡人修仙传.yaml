              content: 本次测试规则：沿着竹林、岩壁到山崖，正午前到达崖顶者为正式弟子，其余可作记名弟子。出发！
              speaker_id: char_yuetangzhu
              speaker_name: 岳堂主
              tone: 严肃地宣布
            - type: action
              id: elem_3
              content: 岳堂主话音落下，众孩童争先恐后冲入竹林，韩立也混杂其中，向前奔去。
