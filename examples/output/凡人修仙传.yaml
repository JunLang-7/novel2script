            location_type: 城镇
            time_of_day: 中午到下午
            atmosphere: 热闹、陌生、稍显忙碌
          summary: 韩立与三叔乘坐马车到达青牛镇春香酒楼，三叔把他安顿在偏僻小院休息，自己出去招呼客人，韩立倒头就睡。
          chapter_source: 2
          mood: 疲倦中带着新鲜感
          characters_present:
            - id: char_hanli
              state: 疲惫、初到陌生环境
            - id: char_sanshu
              state: 忙碌、照顾侄子
          elements:
            - type: action
              id: elem_1
              content: 一辆老旧马车缓缓停在青牛镇春香酒楼后院，车帘掀开，三叔先跳下车，随后韩立跟着爬下。马车轮子碾过青石板，扬起一阵尘土。后院人声嘈杂，几个伙计正搬着酒坛，空气中混杂着酒香和油烟气。
              visual_cue: 镜头从马车轮子摇到三叔和韩立，再扫过后院忙碌景象
            - type: action
              id: elem_2
              content: 三叔领着韩立穿过一条狭窄走廊，拐入后院的偏僻小院。推开一扇吱呀作响的木门，屋内陈设简单，只有一张木床和一张旧桌。三叔交代几句，拍了拍韩立的肩膀，便转身快步离开，前堂传来嘈杂的招呼声。
              visual_cue: 镜头跟随两人从走廊到小院，门被推开时特写门轴上的灰尘
            - type: action
              id: elem_3
              content: 韩立独自站在屋内，环顾四周，打了个哈欠。他脱掉布鞋，爬到床上，头刚沾到硬邦邦的枕头，便眼皮沉沉合上，很快呼吸变得均匀，沉沉睡去。阳光从窗纸透过，在地上投下斑驳光影。
              visual_cue: 中景拍摄韩立从站到躺，特写他闭上眼的刹那，光线变化暗示时间流逝
    - id: act_2
      title: 第二幕
      summary: 故事发展
      scenes:
