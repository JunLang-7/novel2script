          characters_present:
            - id: char_hanli
              state: 机警、默默观察、内向
            - id: char_wuyan
              state: 傲慢、被众孩童簇拥
          elements:
            - type: action
              id: elem_1
              content: 韩立在拥挤的车厢内观察其他孩童。他将他们分为三类：以舞岩为首的锦衣少年、衣着整洁的城镇孩童、以及像自己一样衣衫破旧的乡下穷孩子。他目光在每一类孩子身上停留片刻，内心明白阶层之间那道无形的鸿沟。
              visual_cue: 镜头从韩立的主观视角扫过车厢内不同背景的孩童，聚焦于他们的衣着和神态。
        - id: scene_8
          type: scene
          title: 彩霞山暮色
          sequence: 8
          setting:
            location: 彩霞山山脚及清客院
            location_type: 门派
            time_of_day: 傍晚到夜晚
            atmosphere: 壮丽、肃穆、新奇
          summary: 傍晚到达彩霞山，孩童们被落日美景迷住。王护法带领众人上山，遇到岳堂主，被安排到清客院住宿。韩立梦见自己成为武林高手。
          chapter_source: 3
          mood: 惊叹、兴奋、充满幻想
          characters_present:
            - id: char_wanghufa
              state: 恭敬、向岳堂主汇报
            - id: char_yuetangzhu
              state: 威严、大模大样
            - id: char_hanli
              state: 惊叹、兴奋、晚上做梦
          elements:
            - type: action
              id: elem_1
              content: 傍晚时分，彩霞山笼罩在金色的余晖中。一群孩童跟随着王护法沿着山路走来，疲惫但好奇地四处张望。夕阳将天边染成绚烂的橙红色，山峰如剪影般层层叠叠。
            - type: action
              id: elem_2
              content: 几个孩童停下脚步，仰头望着壮丽的落日，发出惊叹声。王护法回头瞥了一眼，不耐烦地挥手催促。
            - type: dialogue
              id: elem_3
              content: 别看了，天快黑了，赶紧上山！
              speaker_id: char_wanghufa
              speaker_name: 王护法
              tone: 催促
              delivery: 语气不耐烦
              visual_cue: 他挥着手，脚步加快
            - type: action
              id: elem_4
              content: 韩立从人群中挤出来，默默跟上队伍，目光却仍留恋地扫过远山。其他孩童也纷纷收回目光，小跑着跟上。
            - type: action
              id: elem_5
              content: 山路蜿蜒向上，树木渐密。前方传来脚步声，一位红脸老者缓步走下，正是百锻堂堂主岳堂主。王护法连忙上前，拱手行礼。
            - type: dialogue
              id: elem_6
              content: 属下王成，护送新一批测试孩童到山，见过岳堂主。
              speaker_id: char_wanghufa
              speaker_name: 王护法
              tone: 恭敬
              delivery: 微微躬身，态度谦卑
              visual_cue: 他停下脚步，让开道路
            - type: dialogue
              id: elem_7
              content: 嗯，人数不少。先带去清客院安置，明日一早开始测试。
              speaker_id: char_yuetangzhu
              speaker_name: 岳堂主
              tone: 威严，不容置疑
              delivery: 扫视孩童们一眼，转身示意王护法带路
              visual_cue: 岳堂主负手而立，目光如电
            - type: action
              id: elem_8
              content: 王护法领命，带着孩童们继续上山。岳堂主则朝相反方向走去，消失在暮色中。
            - type: action
              id: elem_9
              content: 众人来到清客院——一座简朴的院落，几排木房整齐排列。王护法推开一间空房的门，示意孩子们进去。里面只有几张简陋的床铺和一张木桌。
            - type: dialogue
              id: elem_10
              content: 今晚你们就住这里，明日一早听钟声集合。规矩点，别乱跑。
              speaker_id: char_wanghufa
              speaker_name: 王护法
              tone: 告诫
              delivery: 最后警告般扫视一圈，转身离开
              visual_cue: 他推上门，脚步声渐远
            - type: action
              id: elem_11
              content: 韩立选了一张靠墙的床铺，放下随身的小包袱。其他孩童也各自找位置躺下，很快房间里响起窸窸窣窣的翻身声和低声交谈。窗外夜色渐浓，虫鸣四起。
            - type: action
              id: elem_12
              content: 韩立躺在床上，闭上眼睛。疲惫袭来，意识渐渐模糊。他感觉自己走进一个陌生而广阔的练武场，手中握着一柄长剑，身体轻盈如燕。他腾空跃起，剑光闪烁，招招式式凌厉无比，周围的对手纷纷倒下。他感到前所未有的强大和自由。
            - type: action
              id: elem_13
              content: 梦境中，韩立站在山顶，脚下云海翻涌，夕阳如血。他仰天长啸，声震四野。但一阵清脆的钟声突然响起，将一切震碎。
            - type: action
              id: elem_14
              content: 韩立猛地睁开眼，发现自己仍在清客院的床铺上，窗外晨光微熹。钟声还在回荡——那是集合的信号。
