          - id: elem_3_7
            type: dialogue
            speaker_id: char_mojuren
            speaker_name: 墨居仁
            tone: ""
            content: 你知道这东西是给凡人治病的，却敢一个人来黑风岭，倒是有几分胆色。
          - id: elem_3_8
            type: dialogue
