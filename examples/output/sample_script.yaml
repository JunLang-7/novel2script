            type: internal_monologue
            speaker_id: char_hanli
            speaker_name: 韩立
            content: 凝露草喜阴湿，长在靠近溪流的岩石缝里。应该就在这附近。
            visibility: 画外音
          - id: elem_2_3
            type: action
            content: 草丛中传来窸窣声。一条碧绿毒蛇从岩石后猛地弹起，直扑韩立面门。
            visual_cue: 近景，蛇扑向镜头
          - id: elem_2_4
            type: action
            content: 电光石火间，韩立挥出镰刀，毒蛇断成两截落在地上，兀自扭动。
            visual_cue: 快速剪辑，镰刀轨迹
          - id: elem_2_5
            type: action
            content: 韩立大口喘气，额头渗出冷汗。
          - id: elem_2_6
            type: action
            content: 前方岩壁上，几株通体银白的草叶散发着淡淡萤光。
            visual_cue: 推近，凝露草特写
          - id: elem_2_7
            type: internal_monologue
            speaker_id: char_hanli
            speaker_name: 韩立
            content: 凝露草！娘有救了！
            visibility: 画外音
          - id: elem_2_8
            type: action
            content: 韩立小心采集凝露草。就在他采下最后一株时，脚下岩石松动，整个人向后仰倒——下面是数十丈深的山涧。
