            delivery: 摆摆手，声音虚弱
          - id: elem_1_8
            type: internal_monologue
            speaker_id: char_hanli
            speaker_name: 韩立
            content: 郎中说需要凝露草做药引，只有黑风岭深处才有。我必须去一趟。
