            speaker_id: char_hanli
            speaker_name: 韩立
            tone: ""
            content: 王婶早。山上晨露重，草药的药性在日出前最好，所以就早起了一个时辰。
            delivery: 笑着应答
          - id: elem_1_4
            type: action
            content: 韩立快步走向自家小院。三间土坯房，院子里晒着半干的草药。
            visual_cue: 跟拍，推至小院
          - id: elem_1_5
            type: action
            content: 屋内传来剧烈的咳嗽声。韩立面色一紧，放下药篓快步进屋。
            visual_cue: 切至室内
          - id: elem_1_6
            type: dialogue
            speaker_id: char_hanli
            speaker_name: 韩立
            tone: ""
